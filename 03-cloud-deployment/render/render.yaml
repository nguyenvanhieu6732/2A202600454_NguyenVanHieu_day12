# ============================================================
# render.yaml — Infrastructure as Code cho Render
# Docs: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: python
    region: singapore
    plan: free

    buildCommand: cd 03-cloud-deployment/railway && pip install -r requirements.txt
    startCommand: cd 03-cloud-deployment/railway && uvicorn app:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: PYTHON_VERSION
        value: 3.11.0

      # Set manually in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false

      # Auto-generated secret
      - key: AGENT_API_KEY
        generateValue: true

    # Optional persistent disk
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

  # ──────────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru

    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all access to Redis