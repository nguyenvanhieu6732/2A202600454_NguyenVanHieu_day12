# ============================================================
# render.yaml — Infrastructure as Code cho Render
#
# Docs: https://render.com/docs/blueprint-spec
# Commit file này vào git → Render tự sync infrastructure.
# ============================================================

services:
  # ──────────────────────────────────────
  # Web Service — AI Agent
  # ──────────────────────────────────────
  - type: web
    name: ai-agent
    runtime: python
    region: singapore
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: PYTHON_VERSION
        value: 3.11.0

      # Secrets — set qua Render Dashboard
      - key: OPENAI_API_KEY
        sync: false

      - key: AGENT_API_KEY
        generateValue: true

    # Nếu cần mount disk:
    # disk:
    #   name: agent-data
    #   mountPath: /data
    #   sizeGB: 1

  # ──────────────────────────────────────
  # Redis Cache
  # ──────────────────────────────────────
  - type: redis
    name: agent-cache
    plan: free
    maxmemoryPolicy: allkeys-lru

    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all access to Redis